<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin.Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container nav-content">
            <div class="logo">
                ◉ Fin.Up
            </div>
            <button class="btn" id="btnNovaTransacao">
                + Nova transação
            </button>
        </div>
    </header>

    <main>
        <div class="container"> 
            <section class="saldo" id="cardSaldo">
                <div class="saldo-topo">
                    <p>Saldo disponível</p>
                    <div id="badgeAlerta" class="badge-alerta hidden">⚠ Limite excedido</div>
                </div>

                <h1 id="saldoTotal">R$ 0,00</h1>
            
                <div class="resumos">
                    <div>
                        <span>↗ Receitas</span>
                        <strong id="totalReceitas">R$ 0,00</strong>
                    </div>  
                    <div>
                        <span>↘ Despesas</span>
                        <strong id="totalDespesas">R$ 0,00</strong>
                    </div>
                </div>
            </section>

            <section class="card orcamento">
                <div class="card-header">
                    <div>
                        <h3>Orçamento mensal</h3>
                        <p id="textoOrcamento">R$ 0,00 de R$ 1.500,00</p>
                    </div>
                    <a href="#" id="btnEditarLimite">Editar limite</a>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="barraOrcamento" style="width: 0%;"></div>
                </div>

                <div class="progress-labels">
                    <span>0%</span>
                    <span id="porcentagemOrcamento">0%</span>
                </div>
            </section>

            <section class="card">
                <h3>Gastos por categoria</h3>
                <div id="listaCategorias" class="lista-categorias">
                    </div>
            </section>

            <section class="card card-historico">
                <div class="card-header">
                    <h3>Histórico</h3>
                    <span id="qtdRegistros" class="text-muted">0 registros</span>
                </div>

                <div id="listaTransacoes" class="lista-historico">
                    Nenhuma transação ainda.
                </div>
            </section>
        </div>
    </main>
    
    <!-- MODAL NOVA TRANSAÇÃO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Nova transação</h3>
                <button class="btn-close" id="btnFecharModal">&times;</button>
            </div>

            <form id="formTransacao">
                <!-- Descrição -->
                <input type="text" id="descricao" placeholder="Descrição" required class="input-field">

                <!-- Seletor Tipo (Despesa / Receita) -->
                <div class="tipo-selector">
                    <button type="button" class="btn-tipo active" data-tipo="despesa" id="btnDespesa">Despesa</button>
                    <button type="button" class="btn-tipo" data-tipo="receita" id="btnReceita">Receita</button>
                </div>

                <!-- Categoria e Valor na mesma linha -->
                <div class="form-row">
                    <select id="categoria" class="input-field" required>
                        <option value="Outros">Outros</option>
                        <option value="Renda">Renda</option>
                        <option value="Moradia">Moradia</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Educação">Educação</option>
                    </select>

                    <input type="number" step="0.01" id="valor" placeholder="R$ 0,00" required class="input-field">
                </div>

                <!-- Data -->
                <input type="date" id="data" required class="input-field">

                <!-- Botão Adicionar -->
                <button type="submit" class="btn-submit">Adicionar</button>
            </form>
        </div>
    </div>

    <!-- MODAL EDITAR LIMITE -->
    <div class="modal-overlay" id="modalLimite">
        <div class="modal">
            <div class="modal-header">
                <h3>Editar Limite Mensal</h3>
                <button type="button" class="btn-close" id="btnCancelarLimite">&times;</button>
            </div>
            
            <form id="formEditarLimite">
                <label for="inputNovoLimite" style="display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500;">Novo valor limite (R$):</label>
                <input type="number" id="inputNovoLimite" step="0.01" placeholder="Ex: 1500.00" required class="input-field">
                
                <div class="modal-botoes" style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 15px;">
                    <button type="submit" class="btn-submit" style="margin-top: 0;">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dados.js"></script>
    <script src="storage.js"></script>
    <script src="calculos.js"></script>
    <script src="dom.js"></script>
    <script src="eventos.js"></script>
    <script src="app.js"></script>
</body>
</html>
